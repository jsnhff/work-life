    <body>
        <canvas id="beach-canvas"></canvas>
        <h1 class="sub-title"></h1>
    </body>
    <script src="js/beach.js"></script>
    <script>
        // Load phrases and cycle them
        var subTitle = document.querySelector('.sub-title');
        var subtitles = [];

        function pickPhrase() {
            if (!subtitles.length) return;
            var i = Math.floor(Math.random() * subtitles.length);
            subTitle.textContent = subtitles[i];
        }

        function fadeIn(el, duration, cb) {
            el.style.transition = 'opacity ' + (duration / 1000) + 's';
            el.style.opacity = 1;
            setTimeout(cb || function(){}, duration);
        }

        function fadeOut(el, duration, cb) {
            el.style.transition = 'opacity ' + (duration / 1000) + 's';
            el.style.opacity = 0;
            setTimeout(cb || function(){}, duration);
        }

        function cycle() {
            fadeIn(subTitle, 800, function () {
                setTimeout(function () {
                    fadeOut(subTitle, 1200, function () {
                        pickPhrase();
                        setTimeout(cycle, 400);
                    });
                }, 4000);
            });
        }

        fetch('data/phrases.txt')
            .then(function (r) { return r.text(); })
            .then(function (txt) {
                subtitles = txt.split('\n').map(function (s) { return s.trim(); })
                               .filter(function (s) { return s.length > 0; });
                pickPhrase();
                setTimeout(cycle, 1500);
            });
    </script>
